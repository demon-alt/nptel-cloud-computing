<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EIA Quiz - Premium Edition</title>
    <style>
        :root { 
            /* Light Mode Variables */
            --primary: #444444; 
            --accent: #6200ee;
            --success: #00c853; 
            --danger: #d50000; 
            --bg: #f8f9fa; 
            --surface: #ffffff;
            --card-border: #e0e0e0;
            --text-main: #202124;
            --option-bg: #f1f3f4;
            --option-hover: #e8eaed;
            --header-bg: rgba(255, 255, 255, 0.95);
        }
        
        body.dark-mode {
            /* Dark Mode Overrides */
            --primary: #e0e0e0; 
            --accent: #bb86fc;
            --bg: #0a0a0a; 
            --surface: #1e1e1e;
            --card-border: #333;
            --text-main: #ffffff;
            --option-bg: #252525;
            --option-hover: #2d2d2d;
            --header-bg: rgba(18, 18, 18, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Fixed Header - Adapts to Theme */
        .header { 
            width: 100%;
            max-width: 600px;
            position: sticky; 
            top: 0; 
            background: var(--header-bg); 
            backdrop-filter: blur(10px);
            padding: 15px; 
            z-index: 100; 
            border-bottom: 1px solid var(--card-border); 
        }

        /* Modern Redesigned Week Selector */
        .selector-container {
            position: relative;
            margin-bottom: 5px;
        }

        select { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 12px; 
            border: 2px solid var(--accent); 
            background: var(--surface); 
            color: var(--text-main);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            appearance: none;
            outline: none;
            transition: 0.3s;
        }

        .selector-container::after {
            content: '▼';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            pointer-events: none;
            font-size: 12px;
        }

        .stats-bar { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 11px; 
            margin-top: 10px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
        }

        #quiz-wrapper {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            flex-grow: 1;
        }

        .quiz-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .q-text { font-size: 18px; line-height: 1.4; margin-bottom: 20px; color: var(--text-main); font-weight: 600; }

        .option-label {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: var(--option-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-main);
        }

        .option-label:hover { background: var(--option-hover); }
        
        input[type="radio"] { 
            margin-right: 15px; 
            accent-color: var(--accent); 
            scale: 1.2; 
        }

        .option-label.selected { 
            border-color: var(--accent); 
            background: rgba(98, 0, 238, 0.1); 
        }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        
        .feedback-correct { background: rgba(0, 200, 83, 0.1); border: 1px solid var(--success); color: var(--success); }
        .feedback-wrong { background: rgba(213, 0, 0, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .description-box { margin-top: 10px; color: var(--primary); border-top: 1px solid var(--card-border); padding-top: 10px; font-style: italic; }

        /* High Contrast Submit Button */
        .controls { display: flex; gap: 10px; margin-top: 25px; }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-submit { 
            background: var(--accent); 
            color: #ffffff !important; /* Forces white text for contrast */
            box-shadow: 0 4px 15px rgba(98, 0, 238, 0.3);
        }

        .btn-submit:disabled { 
            background: #cccccc; 
            color: #777777 !important; 
            box-shadow: none; 
            cursor: not-allowed; 
        }

        .btn-next { 
            background: var(--text-main); 
            color: var(--surface); 
        }

        .progress-container { width: 100%; background: var(--option-bg); height: 8px; border-radius: 4px; margin-top: 15px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.5s ease; }

        /* Error Log Area */
        #review-panel { width: 100%; max-width: 600px; padding: 20px; }
        .log-card { 
            background: var(--surface);
            border: 1px solid var(--card-border);
            border-left: 5px solid var(--danger); 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 15px;
            cursor: pointer;
        }

        .theme-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 1000;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="dark-mode"> <div class="header">
    <div class="selector-container">
        <select id="week-selector" onchange="initQuiz()">
            <option value="1">Week 1: Introduction</option>
            <option value="2">Week 2: Virtualization I</option>
            <option value="3">Week 3: Virtualization II</option>
            <option value="4">Week 4: Architecture & Acts</option>
            <option value="5">Week 5: Resource Management</option>
            <option value="6">Week 6: Cloud Security</option>
            <option value="7">Week 7: MCC</option>
            <option value="8">Week 8: Docker & K8s</option>
            <option value="9">Week 9: Fog Computing</option>
            <option value="10">Week 10: Interoperability</option>
            <option value="11">Week 11: Serverless</option>
        </select>
        
    </div>
    
    <div class="progress-container"><div id="progress-bar"></div></div>
    
    <div class="stats-bar">
        <span>SCORE: <span id="current-score">0</span></span>
        <span style="text-align:right">PROGRESS: <span id="q-count">0/0</span></span>
    </div>
</div>

<div id="quiz-wrapper">
    <div id="quiz-container" class="quiz-card"></div>
    <div class="controls">
        <button id="submit-btn" class="btn btn-submit" onclick="checkAnswer()" disabled>Submit Answer</button>
        <button id="next-btn" class="btn btn-next" onclick="nextQuestion()" style="display:none">Next Question</button>
    </div>
</div>

<div id="review-panel">
    <h3 style="color:var(--danger); font-size: 14px; letter-spacing: 2px;">ERROR LOG</h3>
    <div id="wrong-log"></div>
    <button class="btn" style="background:transparent; color:var(--danger); border: 1px solid var(--danger); width: 100%; margin-top: 20px; font-size: 11px;" onclick="clearData()">Reset History</button>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>

};let currentQuestions = [];
let currentIdx = 0;
let score = 0;
let currentWeek = "1";

function initQuiz(jumpToIdx = 0) {
    currentWeek = document.getElementById('week-selector').value;
    currentQuestions = quizData[currentWeek] || [];
    currentIdx = jumpToIdx;
    score = 0;
    renderQuestion();
    updateUI();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestion() {
    const container = document.getElementById('quiz-container');
    const q = currentQuestions[currentIdx];
    
    if(!q) {
        container.innerHTML = `<div style="text-align:center"><h2>Assignment Complete!</h2><p>Your Score: ${score}/${currentQuestions.length}</p><button class="btn btn-submit" onclick="initQuiz()">Restart</button></div>`;
        document.querySelector('.controls').style.display = 'none';
        return;
    }

    document.querySelector('.controls').style.display = 'flex';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('submit-btn').disabled = true;

    let html = `<div class="q-text">Q${currentIdx + 1}: ${q.q}</div>`;
    q.options.forEach((opt, i) => {
        html += `
            <label class="option-label" id="opt-label-${i}">
                <input type="radio" name="quiz-opt" value="${i}" onclick="enableSubmit(${i})">
                ${opt}
            </label>
        `;
    });
    html += `<div id="feedback" class="feedback-area"></div>`;
    container.innerHTML = html;
}

function enableSubmit(index) {
    document.getElementById('submit-btn').disabled = false;
    document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected'));
    document.getElementById(`opt-label-${index}`).classList.add('selected');
}

function checkAnswer() {
    const selected = document.querySelector('input[name="quiz-opt"]:checked');
    const answer = parseInt(selected.value);
    const q = currentQuestions[currentIdx];
    const feedback = document.getElementById('feedback');
    const isCorrect = answer === q.a;

    feedback.style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';

    if(isCorrect) {
        score++;
        feedback.className = 'feedback-area feedback-correct';
        feedback.innerHTML = `<strong>Correct!</strong>`;
        removeFromErrorLog(q.q);
    } else {
        feedback.className = 'feedback-area feedback-wrong';
        feedback.innerHTML = `<strong>Incorrect.</strong> Correct answer: ${q.options[q.a]}`;
        saveToErrorLog(q.q, q.options[q.a], q.options[answer], q.description, currentIdx, currentWeek);
    }
    feedback.innerHTML += `<div class="description-box">${q.description}</div>`;
    document.querySelectorAll('input[name="quiz-opt"]').forEach(i => i.disabled = true);
    updateUI();
}

function nextQuestion() {
    currentIdx++;
    renderQuestion();
    updateUI();
}

function updateUI() {
    document.getElementById('current-score').innerText = `${score} / ${currentQuestions.length}`;
    document.getElementById('q-count').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
    const progress = currentQuestions.length > 0 ? (currentIdx / currentQuestions.length) * 100 : 0;
    document.getElementById('progress-bar').style.width = progress + '%';
}

function saveToErrorLog(q, a, wrong, desc, idx, week) {
    let logs = JSON.parse(localStorage.getItem('eia_errors') || '[]');
    if (!logs.some(l => l.q === q)) {
        logs.push({ q, a, wrong, desc, idx, week });
        localStorage.setItem('eia_errors', JSON.stringify(logs));
        renderLogs();
    }
}

function removeFromErrorLog(questionText) {
    let logs = JSON.parse(localStorage.getItem('eia_errors') || '[]');
    logs = logs.filter(l => l.q !== questionText);
    localStorage.setItem('eia_errors', JSON.stringify(logs));
    renderLogs();
}

function renderLogs() {
    const logs = JSON.parse(localStorage.getItem('eia_errors') || '[]');
    const container = document.getElementById('wrong-log');
    if(logs.length === 0) { container.innerHTML = `<p style="font-size:12px; opacity:0.5; text-align:center;">No mistakes yet!</p>`; return; }
    container.innerHTML = logs.reverse().map((l, i) => `
        <div class="log-card" onclick="this.classList.toggle('expanded')">
            <span style="background:var(--accent); color:white; padding:2px 6px; border-radius:4px; font-size:9px; float:right;" onclick="jumpTo('${l.week}', ${l.idx})">JUMP</span>
            <strong>Q:</strong> ${l.q}
            <div class="log-details" style="display:none; margin-top:10px; font-size:13px; border-top:1px solid var(--card-border); padding-top:10px;">
                <p style="color:var(--danger)">Wrong: ${l.wrong}</p>
                <p style="color:var(--success)">Correct: ${l.a}</p>
            </div>
        </div>
    `).join('');
    
    // Add logic to expand log cards
    document.querySelectorAll('.log-card').forEach(card => {
        card.addEventListener('click', function(e) {
            if(e.target.tagName !== 'SPAN') {
                const details = this.querySelector('.log-details');
                details.style.display = details.style.display === 'none' ? 'block' : 'none';
            }
        });
    });
}

function jumpTo(week, idx) {
    event.stopPropagation();
    document.getElementById('week-selector').value = week;
    initQuiz(idx);
}

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('theme-btn');
    body.classList.toggle('dark-mode');
    const isDark = body.classList.contains('dark-mode');
    btn.innerHTML = isDark ? "☀️" : "🌙";
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function clearData() { if(confirm("Reset all data?")) { localStorage.clear(); location.reload(); } }

window.onload = () => {
    const saved = localStorage.getItem('theme') || 'dark';
    if(saved === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-btn').innerHTML = "☀️";
    } else {
        document.body.classList.remove('dark-mode');
        document.getElementById('theme-btn').innerHTML = "🌙";
    }
    initQuiz();
    renderLogs();
};
</script>
